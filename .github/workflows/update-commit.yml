name: Auto Update direct commit

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cask:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        cask:
          - name: defguard-client
            repo: DefGuard/client
          - name: f2-binary
            repo: ayoisaiah/f2
          - name: gotohp
            repo: xob0t/gotohp
          - name: usql
            repo: xo/usql
          - name: materialgram
            repo: kukuruzka165/materialgram
          - name: fagram
            repo: fagramdesktop/fadesktop
          - name: itsypad
            repo: nickustinov/itsypad-macos
          - name: 3utools
            repo: 3utools
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Check & update version
        id: update
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ matrix.cask.repo }}
          CASK_NAME: ${{ matrix.cask.name }}
        run: |
          echo "::group::$CASK_NAME"

          CASK_FILE="Casks/${CASK_NAME}.rb"

          if [ "$REPO" = "3utools" ]; then
            PAGE_SOURCE=$(curl -sL --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" "https://www.3u.com/productsWin")
            DOWNLOAD_URL=$(echo "$PAGE_SOURCE" | grep -oE 'https://dl\.3u\.com/update/v900/macos/arm64/3uTools_v([0-9.]*)_arm64\.dmg' | head -1 || true)

            echo "-----------------"
            echo $DOWNLOAD_URL
            echo "-----------------"

            if [ -z "$DOWNLOAD_URL" ]; then
              echo "::warning::Could not find macOS download link"
              echo "::endgroup::"
              exit 1
            fi
            LATEST_VERSION=$(echo "$DOWNLOAD_URL" | sed -n 's/.*3uTools_v\([0-9.]*\)_arm64\.dmg/\1/p')
          else
            LATEST_TAG=$(gh release view --repo "$REPO" --json tagName -q .tagName 2>/dev/null || true)
            if [ -z "$LATEST_TAG" ]; then
              echo "::warning::No GitHub releases found for $REPO"
              echo "::endgroup::"
              exit 0
            fi
            LATEST_VERSION="${LATEST_TAG#v}"
          fi

          CURRENT_VERSION=$(sed -n 's/.*version "\([^"]*\)".*/\1/p' "$CASK_FILE")
          echo "Current: $CURRENT_VERSION"
          echo "Latest:  $LATEST_VERSION"

          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "$CURRENT_VERSION" ]; then
            echo "No update needed"
            echo "::endgroup::"
            exit 0
          fi

          NEWER=$(printf '%s\n%s\n' "$CURRENT_VERSION" "$LATEST_VERSION" | sort -V | tail -1)
          if [ "$NEWER" != "$LATEST_VERSION" ]; then
            echo "Current version is newer, skipping"
            echo "::endgroup::"
            exit 0
          fi

          echo "Updating to $LATEST_VERSION..."
          ESCAPED_CURRENT=$(printf '%s\n' "$CURRENT_VERSION" | sed 's/[.[\]\\*^$]/\\&/g')
          sed -i "s/version \"${ESCAPED_CURRENT}\"/version \"${LATEST_VERSION}\"/" "$CASK_FILE"
          echo "Done"

          echo "::endgroup::"

      - name: Commit and push to main
        env:
          CASK_NAME: ${{ matrix.cask.name }}
        run: |
          CASK_FILE="Casks/${CASK_NAME}.rb"

          if git diff --quiet -- "$CASK_FILE"; then
            echo "No changes to commit."
            exit 0
          fi

          LATEST_VERSION=$(sed -n 's/.*version "\([^"]*\)".*/\1/p' "$CASK_FILE")

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CASK_FILE"
          git commit -m "chore: update ${CASK_NAME} to ${LATEST_VERSION}"

          push_succeeded=false
          for attempt in 1 2 3; do
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              if [ "$attempt" -eq 3 ]; then
                echo "Rebase failed after retries."
                exit 1
              fi
              sleep 2
              continue
            fi

            if git push origin HEAD:main; then
              push_succeeded=true
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              break
            fi
            sleep 2
            continue
          done
          if [ "$push_succeeded" != "true" ]; then
            echo "Push failed after retries."
            exit 1
          fi

  update-formula:
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        formula:
          - name: cliproxyapi-plus
            file: Formula/cliproxyapi-plus.rb
            repo: router-for-me/CLIProxyAPIPlus
            assets:
              - arch: arm64
                pattern: "CLIProxyAPIPlus_{version}_darwin_arm64.tar.gz"
              - arch: amd64
                pattern: "CLIProxyAPIPlus_{version}_darwin_amd64.tar.gz"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Check latest version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG=$(gh release view --repo ${{ matrix.formula.repo }} --json tagName -q .tagName)
          LATEST_VERSION="${LATEST_TAG#v}"

          CURRENT_VERSION=$(sed -n 's/.*version "\([^"]*\)".*/\1/p' ${{ matrix.formula.file }})

          echo "Latest version: $LATEST_VERSION"
          echo "Current version: $CURRENT_VERSION"

          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$LATEST_VERSION" = "$CURRENT_VERSION" ]; then
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          else
            NEWER=$(printf '%s\n%s\n' "$CURRENT_VERSION" "$LATEST_VERSION" | sort -V | tail -1)
            if [ "$NEWER" = "$LATEST_VERSION" ]; then
              echo "update_needed=true" >> "$GITHUB_OUTPUT"
            else
              echo "update_needed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Update formula version and checksums
        if: steps.check.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_VERSION: ${{ steps.check.outputs.current_version }}
          LATEST_VERSION: ${{ steps.check.outputs.latest_version }}
          LATEST_TAG: ${{ steps.check.outputs.latest_tag }}
        run: |
          # Update version string
          ESCAPED_CURRENT=$(printf '%s\n' "$CURRENT_VERSION" | sed 's/[.[\]\\*^$]/\\&/g')
          sed -i "s/version \"${ESCAPED_CURRENT}\"/version \"${LATEST_VERSION}\"/" ${{ matrix.formula.file }}

          # Fetch release asset download URLs
          ASSETS_JSON=$(gh release view --repo ${{ matrix.formula.repo }} "$LATEST_TAG" --json assets -q '.assets[] | {name: .name, url: .url}')

          # Helper: compute sha256 for a given asset filename pattern (with version substituted)
          compute_sha256() {
            local pattern="$1"
            local asset_name="${pattern/\{version\}/$LATEST_VERSION}"
            local download_url
            download_url=$(echo "$ASSETS_JSON" | jq -r --arg name "$asset_name" 'select(.name == $name) | .url')
            if [ -z "$download_url" ]; then
              echo "ERROR: asset '$asset_name' not found in release $LATEST_TAG" >&2
              return 1
            fi
            curl -fsSL "$download_url" | sha256sum | awk '{print $1}'
          }

          # Update each architecture's sha256
          ASSETS='${{ toJSON(matrix.formula.assets) }}'
          while IFS= read -r asset; do
            ARCH=$(echo "$asset" | jq -r '.arch')
            PATTERN=$(echo "$asset" | jq -r '.pattern')
            NEW_SHA=$(compute_sha256 "$PATTERN") || {
              echo "Skipping sha256 update for arch $ARCH due to missing asset."
              continue
            }
            echo "New sha256 for $ARCH: $NEW_SHA"

            ASSET_NAME="${PATTERN/\{version\}/$LATEST_VERSION}"
            # Use python for reliable multi-line sed-like replacement
            python3 - "${{ matrix.formula.file }}" "$ASSET_NAME" "$NEW_SHA" "$LATEST_VERSION" <<'PYEOF'
          import sys, re

          formula_filepath, asset_name, new_sha, latest_version = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
          with open(formula_filepath) as f:
              content = f.read()

          # Formula URLs use Ruby interpolation (#{version}), not the literal version string.
          # Replace the literal version back with #{version} for matching.
          formula_asset = asset_name.replace(latest_version, '#{version}')

          # Match url line containing formula_asset followed by a sha256 line
          pattern = re.compile(
              r'(url\s+"[^"]*' + re.escape(formula_asset) + r'[^"]*"\n)'
              r'(\s*sha256\s+)"[0-9a-f]+"',
              re.MULTILINE
          )
          new_content = pattern.sub(r'\1\g<2>"' + new_sha + '"', content)
          with open(formula_filepath, 'w') as f:
              f.write(new_content)
          print(f"Updated sha256 for {asset_name} to {new_sha}")
          PYEOF
          done < <(echo "$ASSETS" | jq -c '.[]')

      - name: Commit and push to main
        if: steps.check.outputs.update_needed == 'true'
        env:
          FORMULA_NAME: ${{ matrix.formula.name }}
          LATEST_VERSION: ${{ steps.check.outputs.latest_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "${{ matrix.formula.file }}"; then
            echo "No changes to commit."
            exit 0
          fi

          git add "${{ matrix.formula.file }}"
          git commit -m "chore: update ${FORMULA_NAME} to ${LATEST_VERSION}"

          push_succeeded=false
          for attempt in 1 2 3; do
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              if [ "$attempt" -eq 3 ]; then
                echo "Rebase failed after retries."
                exit 1
              fi
              sleep 2
              continue
            fi

            if git push origin HEAD:main; then
              push_succeeded=true
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              break
            fi
            sleep 2
            continue
          done
          if [ "$push_succeeded" != "true" ]; then
            echo "Push failed after retries."
            exit 1
          fi
